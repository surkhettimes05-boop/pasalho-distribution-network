name: Pasalho DNP CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Next.js build compilation check
        run: npm run build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/pasalho"
          POSTGRES_URL: "postgresql://postgres:postgres@localhost:5432/pasalho"
          JWT_SECRET: "ci_secret_test_key"
